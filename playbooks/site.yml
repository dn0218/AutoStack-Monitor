---
# 第一阶段：基础环境与 NFS 服务端
- name: Phase 1 - Infrastructure & NFS Server
  hosts: linux_nodes
  become: yes
  roles:
    - common
    # 仅在被标记为 NFS Server 的节点上运行
    - { role: nfs_server, when: is_nfs_server | bool }

# 第二阶段：NFS 客户端挂载 (必须在 Server 之后)
- name: Phase 2 - Storage Mount
  hosts: linux_nodes
  become: yes
  roles:
    - { role: nfs_client, when: not is_nfs_server | bool }

# 第三阶段：容器应用部署 (此时 /home/{{ deploy_user }}/data/wp 已经是挂载状态)
- name: Phase 3 - App Deployment
  hosts: linux_nodes
  become: no
  remote_user: "{{ deploy_user }}"
  roles:
    - podman_rootless

# 第四阶段：监控部署
- name: Phase 4 - Monitoring Integration
  hosts: linux_nodes
  become: yes  # 监控部署通常涉及安装插件或开启 Socket 权限，可能需要特权
  roles:
    - monitoring
